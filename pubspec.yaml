name: unilitix
description: >-
  Official Flutter SDK for Unilitix — African-first mobile UX
  analytics. Auto-tracks sessions, screens, taps, crashes and
  rage taps with a single line of code.
version: 1.0.0
homepage: https://unilitix.com
repository: https://github.com/Unilitix-hq/unilitix-flutter
issue_tracker: https://github.com/Unilitix-hq/unilitix-flutter/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.unilitix.unilitix_flutter
        pluginClass: UnilitixPlugin
      ios:
        pluginClass: UnilitixPlugin
