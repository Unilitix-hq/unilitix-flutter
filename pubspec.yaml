name: unilitix
description: >-
  African-first mobile UX analytics for Flutter. Pure Dart SDK —
  track sessions, screens, events and crashes with a single line of code.
version: 2.0.68
homepage: https://unilitix.com
repository: https://github.com/Unilitix-hq/unilitix-flutter
issue_tracker: https://github.com/Unilitix-hq/unilitix-flutter/issues
documentation: https://docs.unilitix.com
topics:
  - analytics
  - monitoring
  - mobile
  - flutter

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  sqflite: ^2.3.0
  http: ">=1.0.0 <3.0.0"
  device_info_plus: ">=10.0.0 <14.0.0"
  package_info_plus: ">=8.0.0 <11.0.0"
  crypto: ^3.0.3
  shared_preferences: ^2.2.0
  flutter_secure_storage: ">=9.0.0 <11.0.0"
  image: ">=4.0.0 <5.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.unilitix.unilitix_flutter
        pluginClass: UnilitixPlugin
      ios:
        pluginClass: UnilitixPlugin
      web:
        pluginClass: UnilitixPluginWeb
        fileName: unilitix_web.dart
