name: Publish to pub.dev

# Triggers on any tag matching vX.Y.Z, e.g. v1.0.5
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    name: Verify & publish
    runs-on: ubuntu-latest

    # Required for pub.dev OIDC publishing (no secret tokens needed).
    # Set up a trusted publisher at pub.dev → Admin → Automated publishing
    # before this workflow can push to pub.dev.
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib/

      - name: Static analysis
        run: flutter analyze

      - name: Tests
        run: flutter test

      - name: Publish
        run: dart pub publish --force
