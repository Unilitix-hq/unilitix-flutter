name: Check README version

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check README matches pubspec version
        run: |
          SDK_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "pubspec version: $SDK_VERSION"

          if ! grep -q "unilitix: \^$SDK_VERSION" README.md; then
            echo "❌ README.md install snippet is outdated."
            echo "   Expected: unilitix: ^$SDK_VERSION"
            echo "   Found:    $(grep 'unilitix:' README.md | head -1)"
            echo ""
            echo "Fix: update the install snippet in README.md to match pubspec.yaml version"
            exit 1
          fi

          echo "✅ README version matches pubspec: ^$SDK_VERSION"

      - name: Check kUnilitixSdkVersion matches pubspec version
        run: |
          SDK_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          DART_VERSION=$(grep "kUnilitixSdkVersion" lib/src/core/version.dart | grep -o "'[0-9.]*'" | tr -d "'")
          echo "pubspec version:       $SDK_VERSION"
          echo "kUnilitixSdkVersion:   $DART_VERSION"

          if [ "$SDK_VERSION" != "$DART_VERSION" ]; then
            echo "❌ kUnilitixSdkVersion in lib/src/core/version.dart does not match pubspec.yaml."
            echo "   pubspec.yaml:        $SDK_VERSION"
            echo "   kUnilitixSdkVersion: $DART_VERSION"
            echo ""
            echo "Fix: update kUnilitixSdkVersion in lib/src/core/version.dart to '$SDK_VERSION'"
            exit 1
          fi

          echo "✅ kUnilitixSdkVersion matches pubspec: $DART_VERSION"
